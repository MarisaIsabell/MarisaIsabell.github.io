            <script>
  function formatAuthors(creators) {
    if (!creators) return "";

    return creators
      .filter(c => c.creatorType === "author")
      .map(c => `${c.lastName}, ${c.firstName?.[0] || ""}.`)
      .join(", ");
  }

  function getYear(date) {
    if (!date) return "n.d.";
    return date.substring(0, 4);
  }

  async function loadPublications() {
    const list = document.getElementById("publication-list");

    try {
      const response = await fetch("publications.json");
      const publications = await response.json();

      const normalized = publications.map(pub => ({
        year: getYear(pub.date),
        authors: formatAuthors(pub.creators),
        title: pub.title || "",
        journal: pub.publicationTitle || "Preprint",
        doi: pub.DOI || ""
      }));

      normalized.sort((a, b) => b.year.localeCompare(a.year));

      const grouped = normalized.reduce((acc, pub) => {
        if (!acc[pub.year]) acc[pub.year] = [];
        acc[pub.year].push(pub);
        return acc;
      }, {});

      list.innerHTML = "";

      Object.keys(grouped)
        .sort((a, b) => b.localeCompare(a))
        .forEach(year => {
          const yearHeading = document.createElement("h3");
          yearHeading.textContent = year;
          list.appendChild(yearHeading);

          grouped[year].forEach(pub => {
            const item = document.createElement("p");
            item.className = "publication-item";

            const doiLink = pub.doi
              ? `<a href/doi.org/${pub.doi}doi:${pub.doi}</a>`
              : "";

            item.innerHTML = `
              ${pub.authors}
              <strong>${pub.title}</strong>.
              <em>${pub.journal}</em>.
              ${doiLink}
            `;

            list.appendChild(item);
          });
        });

    } catch (error) {
      console.error(error);
      list.innerHTML = "<p>Publication list could not be loaded.</p>";
    }
  }

  loadPublications();
</script>
